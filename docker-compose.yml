services:
  backend:
    build: ./backend
    ports:
      - "8000:8000"
    environment:
      - VIGILANTE_CAMERA_INDEX=0
    group_add:
      - "44"  # video group for camera access
    devices:
      - /dev/video0:/dev/video0

  frontend:
    build: ./frontend
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:8000
    depends_on:
      - backend
